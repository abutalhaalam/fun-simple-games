<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Club: Anomaly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .pixelated { image-rendering: pixelated; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        /* Animations */
        @keyframes pulse-glow { 0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); } 50% { opacity: .7; box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); } }
        .animate-pulse-glow { animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes drop-in { 0% { transform: scale(1.5) translateY(-20px); opacity: 0; filter: brightness(2); } 100% { transform: scale(1) translateY(0); opacity: 1; filter: brightness(1); } }
        .animate-drop-in { animation: drop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Grid Layouts */
        .room-divider { border-top: 4px dashed rgba(236, 72, 153, 0.3); margin-top: 8px; padding-top: 8px; position: relative; }
        .room-divider::before { content: attr(data-room); position: absolute; top: -12px; left: 16px; background: #0a0a16; padding: 0 8px; font-size: 10px; color: #f472b6; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-900 selection:bg-cyan-500/30">
    <div id="app" class="flex-1 flex flex-col"></div>

    <script>
        // --- AUDIO ENGINE (Procedural Synth) ---
        const sfx = {
            ctx: null,
            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play: function(type) {
                try {
                    this.init();
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    const now = this.ctx.currentTime;

                    if (type === 'coin') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start(now); osc.stop(now + 0.1);
                    } else if (type === 'place') {
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start(now); osc.stop(now + 0.1);
                    } else if (type === 'error') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else if (type === 'boom') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(100, now);
                        osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                        gain.gain.setValueAtTime(0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                    } else if (type === 'win') {
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.setValueAtTime(600, now + 0.1);
                        osc.frequency.setValueAtTime(800, now + 0.2);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                    }
                } catch(e) {} // Fail silently if audio blocked
            }
        };

        // --- PARTICLE ENGINE ---
        const spawnParticles = (e, colorCode = '#ef4444') => {
            const rect = e.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.style.position = 'fixed';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.width = (Math.random() * 6 + 4) + 'px';
                p.style.height = p.style.width;
                p.style.backgroundColor = colorCode;
                p.style.pointerEvents = 'none';
                p.style.zIndex = '9999';
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 30;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity + 50; // gravity bias
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 600 + Math.random()*400, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' });
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        };

        // --- MATH & UTILS ---
        const hashSeed = (value) => { let h = 2166136261; for (let i = 0; i < value.length; i += 1) { h ^= value.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; };
        const pick = (seed, items, offset = 0) => items[(hashSeed(`${seed}-${offset}`) + offset) % items.length];
        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const createUid = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
        const saveScore = (night) => { const best = localStorage.getItem('cyberClubBest') || 0; if (night > best) localStorage.setItem('cyberClubBest', night); };
        const getBestScore = () => localStorage.getItem('cyberClubBest') || 1;

        // --- GRID MATH ---
        const GRID_W = 5;
        const getAdjacentIndices = (index, totalTiles) => {
            const adj = [];
            const x = index % GRID_W;
            const y = Math.floor(index / GRID_W);
            const rows = Math.ceil(totalTiles / GRID_W);
            if (x > 0) adj.push(index - 1);
            if (x < GRID_W - 1) adj.push(index + 1);
            if (y > 0) adj.push(index - GRID_W);
            if (y < rows - 1) adj.push(index + GRID_W);
            return adj.filter(i => i < totalTiles);
        };

        // --- DATABASE ---
        const ROLE_STYLE = {
            slacker: { primary: '#64748b', secondary: '#94a3b8', accent: '#cbd5e1', vibe: 'CHILL', hex: '#64748b' },
            student: { primary: '#3b82f6', secondary: '#93c5fd', accent: '#bfdbfe', vibe: 'STUD', hex: '#3b82f6' },
            worker: { primary: '#eab308', secondary: '#fde047', accent: '#fef08a', vibe: 'WORK', hex: '#eab308' },
            partygoer: { primary: '#ec4899', secondary: '#f9a8d4', accent: '#fbcfe8', vibe: 'PARTY', hex: '#ec4899' },
            punk: { primary: '#ef4444', secondary: '#fca5a5', accent: '#fecaca', vibe: 'PUNK', hex: '#ef4444' },
            dealer: { primary: '#f97316', secondary: '#fdba74', accent: '#fed7aa', vibe: 'SHADY', hex: '#f97316' },
            promoter: { primary: '#d946ef', secondary: '#f0abfc', accent: '#fdf4ff', vibe: 'HYPE', hex: '#d946ef' },
            bouncer: { primary: '#10b981', secondary: '#6ee7b7', accent: '#a7f3d0', vibe: 'SEC', hex: '#10b981' },
            hacker: { primary: '#06b6d4', secondary: '#67e8f9', accent: '#cffafe', vibe: 'NET', hex: '#06b6d4' },
            dj: { primary: '#8b5cf6', secondary: '#c4b5fd', accent: '#ede9fe', vibe: 'DJ', hex: '#8b5cf6' },
            manager: { primary: '#ca8a04', secondary: '#fef08a', accent: '#fef9c3', vibe: 'BOSS', hex: '#ca8a04' },
            cop: { primary: '#2563eb', secondary: '#60a5fa', accent: '#dbeafe', vibe: 'LAW', hex: '#2563eb' },
            vip: { primary: '#fbbf24', secondary: '#fef3c7', accent: '#fffbeb', vibe: 'VIP', hex: '#fbbf24' },
            fixer: { primary: '#059669', secondary: '#34d399', accent: '#d1fae5', vibe: 'FIX', hex: '#059669' },
            kingpin: { primary: '#dc2626', secondary: '#f87171', accent: '#fee2e2', vibe: 'DON', hex: '#dc2626' },
            mayor: { primary: '#4f46e5', secondary: '#a5b4fc', accent: '#e0e7ff', vibe: 'GOV', hex: '#4f46e5' },
            celebrity: { primary: '#db2777', secondary: '#f472b6', accent: '#fce7f3', vibe: 'STAR', hex: '#db2777' },
            mastermind: { primary: '#0f766e', secondary: '#34d399', accent: '#ecfdf5', vibe: 'MIND', hex: '#0f766e' },
            anomaly: { primary: '#ffffff', secondary: '#cbd5e1', accent: '#67e8f9', vibe: '???', hex: '#ffffff' },
        };

        const CARD_DB = {
            slacker: { name: 'Slacker', role: 'slacker', seed: 'S1', cost: 1, credits: 1, hype: 0, heat: 0, reqHype: 0, text: 'Base: +$1' },
            student: { name: 'Student', role: 'student', seed: 'S2', cost: 3, credits: 1, hype: 1, heat: 1, reqHype: 0, text: 'Base: +$1, +1 Hype, +1 Heat' },
            worker: { name: 'Worker', role: 'worker', seed: 'W1', cost: 4, credits: 2, hype: 0, heat: 0, reqHype: 0, text: 'Base: +$2' },
            partygoer: { name: 'Partygoer', role: 'partygoer', seed: 'P1', cost: 5, credits: 0, hype: 2, heat: 0, reqHype: 0, text: 'Base: +2 Hype' },
            punk: { name: 'Punk', role: 'punk', seed: 'P2', cost: 5, credits: 3, hype: 0, heat: 1, reqHype: 0, text: 'Base: +$3, +1 Heat' },
            dealer: { name: 'Dealer', role: 'dealer', seed: 'D1', cost: 10, credits: 4, hype: 0, heat: 2, reqHype: 5, text: 'Base: +$4, +2 Heat' },
            promoter: { name: 'Promoter', role: 'promoter', seed: 'P3', cost: 12, credits: 0, hype: 1, heat: 0, reqHype: 5, text: 'Adjacent: +1 Hype per Slacker' },
            bouncer: { name: 'Bouncer', role: 'bouncer', seed: 'B1', cost: 15, credits: 0, hype: 0, heat: -1, reqHype: 10, text: 'Base: -1 Heat. ACTIVE: Kick guest' },
            hacker: { name: 'Netrunner', role: 'hacker', seed: 'H1', cost: 18, credits: 1, hype: 0, heat: 0, reqHype: 15, text: 'ACTIVE: Reroll any guest' },
            dj: { name: 'Star DJ', role: 'dj', seed: 'D2', cost: 22, credits: 1, hype: 2, heat: 0, reqHype: 15, text: 'Global: +1 Hype per 3 total guests' },
            manager: { name: 'Manager', role: 'manager', seed: 'M1', cost: 25, credits: 1, hype: 0, heat: 0, reqHype: 25, text: 'Adjacent: +$2 per Worker' },
            cop: { name: 'Cop', role: 'cop', seed: 'C1', cost: 28, credits: 0, hype: 0, heat: -2, reqHype: 30, text: 'Base: -2 Heat. Adjacent: +1 Heat per Punk' },
            influencer: { name: 'Influencer', role: 'partygoer', seed: 'I1', cost: 30, credits: 0, hype: 3, heat: 1, reqHype: 30, text: 'Adjacent: +1 Hype per Partygoer' },
            vip: { name: 'VIP', role: 'vip', seed: 'V1', cost: 35, credits: 6, hype: 2, heat: 1, reqHype: 40, text: 'Base: +$6, +2 Hype, +1 Heat' },
            fixer: { name: 'Fixer', role: 'fixer', seed: 'F1', cost: 40, credits: 2, hype: 0, heat: -1, reqHype: 45, text: 'Adjacent: Negates all Heat from Dealers' },
            kingpin: { name: 'Kingpin', role: 'kingpin', seed: 'K1', cost: 50, credits: 5, hype: 0, heat: 2, reqHype: 60, text: 'Adjacent: +$3 per Punk or Dealer' },
            mayor: { name: 'Mayor', role: 'mayor', seed: 'M2', cost: 60, credits: 4, hype: 4, heat: -1, reqHype: 75, text: 'Base: +$4, +4 Hype, -1 Heat' },
            celebrity: { name: 'Mega Star', role: 'celebrity', seed: 'C2', cost: 65, credits: 0, hype: 8, heat: 1, reqHype: 80, text: 'Base: +8 Hype, +1 Heat' },
            mastermind: { name: 'Mastermind', role: 'mastermind', seed: 'M3', cost: 75, credits: 0, hype: 0, heat: -3, reqHype: 90, text: 'Base: -3 Heat. ACTIVE: Kick 2 guests' },
            anomaly: { name: 'Anomaly', role: 'anomaly', seed: 'Void', cost: 100, credits: 0, hype: 0, heat: 0, reqHype: 120, text: 'Gather 4 on the board to Transcend' },
        };

        const FURNITURE_DB = {
            plant: { name: 'Potted Plant', icon: 'leaf', cost: 10, credits: 0, hype: 0, heat: -1, color: 'text-emerald-400 border-emerald-500', text: 'Permanent: -1 Heat globally' },
            keg: { name: 'Keg', icon: 'beer', cost: 20, credits: 0, hype: 2, heat: 0, color: 'text-amber-500 border-amber-500', text: 'Permanent: +2 Hype globally' },
            arcade: { name: 'Arcade Cab', icon: 'gamepad-2', cost: 35, credits: 2, hype: 0, heat: 0, color: 'text-fuchsia-400 border-fuchsia-500', text: 'Permanent: +$2 globally' },
            statue: { name: 'Gold Statue', icon: 'trophy', cost: 60, credits: 0, hype: 5, heat: 0, color: 'text-yellow-400 border-yellow-400', text: 'Permanent: +5 Hype globally' },
        };

        const EXPANSIONS = [
            { level: 1, cost: 0, maxHeat: 4, capacity: 10, name: 'Back Alley Basement' },
            { level: 2, cost: 30, maxHeat: 5, capacity: 15, name: 'Warehouse Party' },
            { level: 3, cost: 75, maxHeat: 7, capacity: 20, name: 'Neon Nightclub' },
            { level: 4, cost: 150, maxHeat: 10, capacity: 30, name: 'Mansion Estate' },
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            phase: 'MENU', 
            gameMode: 1,
            players: [],
            activeIdx: 0,
            day: 1,
            viewingDeck: false,
            targeting: null,
            lastPlacedIdx: -1
        };

        const generateCard = (id) => ({ uid: createUid(), id, type: 'guest', abilityUsed: 0, ...CARD_DB[id] });
        const resetCard = (card) => ({ ...card, abilityUsed: 0 });

        const createPlayerState = (name) => ({
            name,
            deck: shuffle([...Array(5).fill('slacker'), ...Array(3).fill('punk')].map(generateCard)),
            discard: [],
            grid: Array(10).fill(null),
            credits: 0,
            hype: 0,
            expansionLevel: 0,
            bounceCost: 5,
        });

        function updateP(updater) {
            let p = state.players[state.activeIdx];
            let updates = typeof updater === 'function' ? updater(p) : updater;
            state.players[state.activeIdx] = { ...p, ...updates };
            renderApp();
        }

        // --- PROCEDURAL AVATAR (SVG Generator) ---
        const getAvatar = (seed, roleId = 'slacker') => {
            const style = ROLE_STYLE[roleId] || ROLE_STYLE.slacker;
            const skin = pick(seed, ['#f5d0a5', '#ddb08a', '#8d5d42', '#f0bf93', '#4a3022', '#a86f52'], 1);
            const hair = pick(seed, ['#0f172a', '#334155', '#7c2d12', '#a16207', '#7e22ce', '#be123c', '#fbbf24', '#f472b6'], 2);
            const faceType = hashSeed(`${seed}-${roleId}-face`) % 3;
            const outfitType = hashSeed(`${seed}-${roleId}-outfit`) % 3;

            let hairBlocks = `<rect x="9" y="7" width="14" height="4" fill="${hair}"/><rect x="8" y="9" width="2" height="5" fill="${hair}"/><rect x="22" y="9" width="2" height="5" fill="${hair}"/>`;
            if (style.vibe === 'PUNK' || style.vibe === 'SHADY') hairBlocks = `<rect x="14" y="2" width="4" height="10" fill="${hair}"/><rect x="12" y="5" width="2" height="6" fill="${hair}"/><rect x="18" y="5" width="2" height="6" fill="${hair}"/>`;
            else if (style.vibe === 'SEC' || style.vibe === 'LAW') hairBlocks = `<rect x="8" y="7" width="16" height="3" fill="#1e293b"/>`;
            else if (style.vibe === '???') hairBlocks = '<rect x="9" y="6" width="14" height="16" rx="4" fill="#e2e8f0" opacity="0.6"/><rect x="12" y="10" width="8" height="2" fill="#ffffff"/><rect x="11" y="18" width="10" height="2" fill="#67e8f9"/>';

            const face = faceType === 0 ? '<rect x="12" y="15" width="2" height="2" fill="#0f172a"/><rect x="18" y="15" width="2" height="2" fill="#0f172a"/><rect x="14" y="19" width="4" height="1" fill="#7c2d12"/>' : faceType === 1 ? '<rect x="12" y="15" width="2" height="2" fill="#0f172a"/><rect x="18" y="15" width="2" height="2" fill="#0f172a"/><rect x="13" y="19" width="6" height="2" fill="#0f172a"/>' : '<rect x="12" y="16" width="2" height="1" fill="#0f172a"/><rect x="18" y="16" width="2" height="1" fill="#0f172a"/><rect x="14" y="19" width="4" height="2" fill="#7c2d12"/>';
            const torso = outfitType === 0 ? `<rect x="10" y="21" width="12" height="8" fill="${style.primary}"/><rect x="13" y="22" width="6" height="7" fill="${style.secondary}"/>` : `<rect x="10" y="21" width="12" height="8" fill="${style.secondary}"/><rect x="14" y="21" width="4" height="8" fill="${style.primary}"/>`;

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges"><rect width="32" height="32" fill="transparent"/>${style.vibe === '???' ? '<rect x="4" y="4" width="24" height="24" rx="4" fill="#67e8f9" opacity="0.15"/>' : ''}<rect x="11" y="10" width="10" height="11" rx="1" fill="${skin}"/>${hairBlocks}${style.vibe !== '???' ? face : ''}${torso}<rect x="9" y="22" width="2" height="4" fill="${skin}"/><rect x="21" y="22" width="2" height="4" fill="${skin}"/></svg>`;
            return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
        };

        // --- GRID MATH & ADJACENCY SYNERGIES ---
        const computeGridStats = (gridState) => {
            const stats = { credits: 0, hype: 0, heat: 0, anomalies: 0 };
            const totalTiles = gridState.length;
            let guestCount = 0;

            gridState.forEach((item, index) => {
                if (!item) return;
                stats.credits += item.credits || 0;
                stats.hype += item.hype || 0;
                stats.heat += item.heat || 0;
                
                if (item.type === 'guest') {
                    guestCount++;
                    if (item.id === 'anomaly') stats.anomalies += 1;

                    const adjIndices = getAdjacentIndices(index, totalTiles);
                    const adjCards = adjIndices.map(i => gridState[i]).filter(Boolean);

                    if (item.id === 'promoter') stats.hype += adjCards.filter(c => c.id === 'slacker').length;
                    if (item.id === 'manager') stats.credits += adjCards.filter(c => c.id === 'worker').length * 2;
                    if (item.id === 'influencer') stats.hype += adjCards.filter(c => c.id === 'partygoer').length;
                    if (item.id === 'cop') stats.heat += adjCards.filter(c => c.id === 'punk').length;
                    if (item.id === 'kingpin') stats.credits += adjCards.filter(c => c.id === 'punk' || c.id === 'dealer').length * 3;
                    if (item.id === 'fixer') stats.heat -= adjCards.filter(c => c.id === 'dealer').length * 2;
                }
            });

            gridState.forEach((item) => {
                if (item && item.id === 'dj') stats.hype += Math.floor(guestCount / 3);
            });

            stats.heat = Math.max(0, stats.heat);
            return stats;
        };

        // --- ACTIONS ---
        window.initGame = (mode) => {
            const nextPlayers = [createPlayerState('Player 1')];
            if (mode === 2) nextPlayers.push(createPlayerState('Player 2'));
            state = { ...state, gameMode: mode, players: nextPlayers, activeIdx: 0, day: 1, viewingDeck: false, targeting: null, phase: 'PARTY', lastPlacedIdx: -1 };
            sfx.play('coin');
            renderApp();
        };

        window.admitGuest = () => {
            let p = state.players[state.activeIdx];
            let currentDeck = [...p.deck];
            let currentDiscard = [...p.discard];

            if (currentDeck.length === 0) {
                if (currentDiscard.length === 0) return;
                currentDeck = shuffle(currentDiscard.map(resetCard));
                currentDiscard = [];
            }

            const drawnCard = currentDeck.shift();
            if (!drawnCard) return;

            const emptyIndices = p.grid.map((c, i) => c === null ? i : null).filter(i => i !== null);
            if (emptyIndices.length === 0) return;

            const placementIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            const newGrid = [...p.grid];
            newGrid[placementIndex] = resetCard(drawnCard);

            const expansion = EXPANSIONS[p.expansionLevel];
            const nextStats = computeGridStats(newGrid);

            updateP({ grid: newGrid, deck: currentDeck, discard: currentDiscard });
            state.targeting = null;
            state.lastPlacedIdx = placementIndex;

            sfx.play('place');

            if (nextStats.anomalies >= 4) {
                state.phase = 'VICTORY';
                sfx.play('win');
            } else if (nextStats.heat >= expansion.maxHeat) {
                state.phase = 'BUSTED';
                sfx.play('error');
            }
            renderApp();
        };

        window.useAbility = (gridIndex, type) => {
            let p = state.players[state.activeIdx];
            const source = p.grid[gridIndex];
            if (!source || source.abilityUsed >= (source.id === 'mastermind' ? 2 : 1) || source.type === 'furniture') return;
            
            sfx.play('coin');
            if (state.targeting?.sourceIdx === gridIndex) {
                state.targeting = null;
            } else {
                state.targeting = { sourceIdx: gridIndex, type };
            }
            renderApp();
        };

        window.handleTileClick = (e, targetIndex) => {
            if (!state.targeting) return;
            let p = state.players[state.activeIdx];
            const expansion = EXPANSIONS[p.expansionLevel];

            const source = p.grid[state.targeting.sourceIdx];
            const target = p.grid[targetIndex];

            if (!target || targetIndex === state.targeting.sourceIdx || target.type === 'furniture') {
                state.targeting = null; 
                renderApp(); return;
            }

            const newGrid = [...p.grid];
            newGrid[state.targeting.sourceIdx] = { ...source, abilityUsed: source.abilityUsed + 1 };
            newGrid[targetIndex] = null;

            sfx.play('boom');
            spawnParticles(e, ROLE_STYLE[target.role]?.hex || '#fff');

            if (state.targeting.type === 'BOUNCE') {
                updateP(prev => ({ grid: newGrid, discard: [...prev.discard, resetCard(target)] }));
            } else if (state.targeting.type === 'HACK') {
                let curDeck = [...p.deck];
                let curDiscard = [...p.discard, resetCard(target)];

                if (curDeck.length === 0 && curDiscard.length > 0) {
                    curDeck = shuffle(curDiscard.map(resetCard));
                    curDiscard = [];
                }
                if (curDeck.length > 0) {
                    newGrid[targetIndex] = resetCard(curDeck.shift());
                }

                const nextStats = computeGridStats(newGrid);
                updateP({ grid: newGrid, deck: curDeck, discard: curDiscard });

                if (nextStats.anomalies >= 4) { state.phase = 'VICTORY'; sfx.play('win'); }
                else if (nextStats.heat >= expansion.maxHeat) { state.phase = 'BUSTED'; sfx.play('error'); }
                
                state.targeting = null;
                state.lastPlacedIdx = targetIndex;
                renderApp();
                return;

            if (source.id === 'mastermind' && source.abilityUsed < 1) {
                // Keep targeting
            } else {
                state.targeting = null;
            }
            renderApp();
        };

        window.endParty = () => {
            let p = state.players[state.activeIdx];
            let runStats = computeGridStats(p.grid);
            updateP(prev => ({
                credits: prev.credits + Math.max(0, runStats.credits),
                hype: prev.hype + Math.max(0, runStats.hype),

            state.viewingDeck = false;
            state.targeting = null;
            state.lastPlacedIdx = -1;
            state.phase = 'SHOP';
            saveScore(state.day);
            sfx.play('coin');

                if (!itemInfo || p.credits < itemInfo.cost) return;
                updateP(prev => {
                    const newGrid = [...prev.grid];
                    const emptyIdx = newGrid.findIndex(c => c === null);
                    if (emptyIdx === -1) return prev;
                    newGrid[emptyIdx] = { uid: createUid(), id, type: 'furniture', ...itemInfo };
                    return { credits: prev.credits - itemInfo.cost, grid: newGrid };
                });
            } else {
                const cardInfo = CARD_DB[id];
                if (!cardInfo || p.credits < cardInfo.cost || p.hype < cardInfo.reqHype) return;
                updateP(prev => ({
                    credits: prev.credits - cardInfo.cost,
                    discard: [...prev.discard, generateCard(id)],

            sfx.play('win');

                return {

                    expansionLevel: prev.expansionLevel + 1,
                    grid: newGrid

                                    ${allCards.map((card) => `
                                        <div onclick="window.bounceDeckCard(event, '${card.uid}', '${card.role}')" class="relative flex h-36 w-28 cursor-pointer flex-col items-center rounded-xl border-2 border-slate-700 bg-slate-900 p-2 transition-all hover:border-red-500 hover:bg-red-950/20 group">
                                            <img src="${getAvatar(card.seed, card.role)}" class="mb-2 h-10 w-10 rounded bg-slate-800 pixelated" />
                                            <div class="mb-auto text-center text-[10px] font-bold uppercase leading-tight text-slate-200">${card.name}</div>
                                            <div class="absolute inset-0 flex flex-col items-center justify-center rounded-lg bg-red-950/80 font-bold text-white opacity-0 transition-opacity group-hover:opacity-100 backdrop-blur-sm">
                                                <i data-lucide="x-circle" class="w-6 h-6 mb-1 text-red-500"></i> SEVER
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : `
                            <div class="flex flex-1 flex-col gap-6 pb-8 lg:flex-row">
                                <div class="flex w-full flex-col gap-4 lg:w-72">
                                    <div class="rounded-xl border border-slate-700 bg-slate-800 p-5 shadow-lg">
                                        <h3 class="mb-3 text-sm font-black uppercase tracking-wide text-white">Club Expansion</h3>
                                        <div class="mb-3 rounded-lg border border-slate-700 bg-slate-900 p-3 text-xs">
                                            <div class="mb-1 flex justify-between"><span class="text-slate-400">Current:</span><span class="text-white font-bold">${expansion.name}</span></div>
                                            <div class="mb-1 flex justify-between"><span class="text-slate-400">Max Heat:</span><span class="font-bold text-orange-500">${expansion.maxHeat}</span></div>
                                            <div class="flex justify-between"><span class="text-slate-400">Capacity:</span><span class="font-bold text-cyan-400">${expansion.capacity} slots</span></div>
                                        </div>
                                        ${EXPANSIONS[p.expansionLevel + 1] ? `
                                            <button onclick="buyExpansion()" ${p.credits < EXPANSIONS[p.expansionLevel + 1].cost ? 'disabled' : ''} class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-600 bg-slate-700 py-3 text-sm font-bold text-slate-200 transition-all hover:border-cyan-500 hover:bg-slate-600 disabled:cursor-not-allowed disabled:opacity-50">
                                                Expand Club <span class="flex items-center gap-1 rounded bg-slate-900 px-1.5 py-0.5 text-cyan-400"><i data-lucide="coins" class="w-3 h-3"></i> ${EXPANSIONS[p.expansionLevel + 1].cost}</span>
                                            </button>
                                        ` : `<div class="w-full rounded-lg border border-emerald-800/50 bg-emerald-900/30 py-3 text-center text-sm font-bold text-emerald-500">FULLY EXPANDED</div>`}
                                    </div>

                                    <div class="rounded-xl border border-slate-700 bg-slate-800 p-5 shadow-lg">
                                        <h3 class="mb-3 text-sm font-black uppercase tracking-wide text-white">Permanent Props</h3>
                                        <p class="text-[10px] text-slate-400 mb-3 leading-tight">These take up capacity but stay on the grid forever.</p>
                                        <div class="flex flex-col gap-2">
                                            ${Object.entries(FURNITURE_DB).map(([itemId, item]) => `
                                                <div class="flex justify-between items-center bg-slate-900 border border-slate-700 p-2 rounded">
                                                    <div class="flex items-center gap-2">
                                                        <i data-lucide="${item.icon}" class="w-4 h-4 text-slate-400"></i>
                                                        <div>
                                                            <div class="text-xs font-bold text-white uppercase">${item.name}</div>
                                                            <div class="text-[8px] text-slate-400">${item.text}</div>
                                                        </div>
                                                    </div>
                                                    <button onclick="buyItem('${itemId}', 'furniture')" ${(p.credits < item.cost || capacityUsed >= expansion.capacity) ? 'disabled' : ''} class="bg-slate-800 hover:bg-cyan-700 text-cyan-400 hover:text-white px-2 py-1 rounded text-[10px] font-bold border border-slate-600 disabled:opacity-50 disabled:hover:bg-slate-800 flex items-center gap-1 transition-colors">
                                                        <i data-lucide="coins" class="w-3 h-3"></i> ${item.cost}
                                                    </button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>

                                <div class="flex-1">
                                    <h3 class="text-sm font-black uppercase tracking-wide text-white mb-4 pl-2 border-l-4 border-pink-500">GUEST ROSTER</h3>
                                    <div class="content-start gap-3 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
                                        ${Object.entries(CARD_DB).sort(([, a], [, b]) => a.cost - b.cost).map(([cardId, card]) => {
                                            const unlocked = p.hype >= card.reqHype;
                                            const canAfford = p.credits >= card.cost;
                                            return `
                                                <div class="relative flex flex-col items-center rounded-xl border-2 p-2 transition-all ${unlocked ? 'border-slate-700 bg-slate-900 hover:border-slate-500 shadow-sm' : 'border-slate-800 bg-slate-950 opacity-50'}">
                                                    ${!unlocked ? `
                                                        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center rounded-xl bg-slate-950/80 p-2 text-center backdrop-blur-sm">
                                                            <i data-lucide="star" class="w-5 h-5 mb-1 text-pink-800"></i>
                                                            <div class="mb-1 text-[8px] font-bold uppercase tracking-widest text-slate-400">Requires</div>
                                                            <div class="text-base font-black text-pink-600">${card.reqHype}</div>
                                                        </div>
                                                    ` : ''}
                                                    <img src="${getAvatar(card.seed, card.role)}" class="mb-1 h-10 w-10 rounded border border-slate-700 bg-slate-800 pixelated" />
                                                    <div class="mb-1 w-full truncate text-center text-[10px] font-black uppercase tracking-tight ${card.id === 'anomaly' ? 'text-white drop-shadow-[0_0_4px_#fff]' : 'text-slate-200'}">${card.name}</div>
                                                    <div class="mb-2 h-7 w-full overflow-hidden text-center text-[8px] leading-tight text-slate-400 line-clamp-2">${card.text}</div>
                                                    <div class="mb-2 flex w-full flex-col gap-0.5 rounded bg-slate-950 p-1.5 border border-slate-800">
                                                        ${card.credits > 0 ? `<div class="flex justify-between text-[9px] font-bold text-cyan-400"><span>Cash</span><span>+${card.credits}</span></div>` : ''}
                                                        ${card.hype > 0 ? `<div class="flex justify-between text-[9px] font-bold text-pink-400"><span>Hype</span><span>+${card.hype}</span></div>` : ''}
                                                        ${card.heat !== 0 ? `<div class="flex justify-between text-[9px] font-bold ${card.heat > 0 ? 'text-orange-500' : 'text-emerald-400'}"><span>Heat</span><span>${card.heat > 0 ? `+${card.heat}` : card.heat}</span></div>` : ''}
                                                    </div>
                                                    <button onclick="buyItem('${cardId}', 'guest')" ${(!unlocked || !canAfford) ? 'disabled' : ''} class="mt-auto flex w-full items-center justify-center gap-1 rounded bg-slate-800 py-1.5 text-[10px] font-bold text-white transition-all hover:bg-cyan-600 disabled:cursor-not-allowed disabled:bg-slate-900 disabled:text-slate-600">
                                                        BUY <span class="flex items-center gap-0.5 text-cyan-400"><i data-lucide="coins" class="w-3 h-3"></i> ${card.cost}</span>
                                                    </button>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        `}
                    </div>
                `;
            }

            app.innerHTML = html;
            lucide.createIcons();
        };

        // --- INIT ---
        window.onload = () => {
            renderApp();
        };
    </script>
</body>
</html>
